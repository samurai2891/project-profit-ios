<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectProfit テスト管理シート v3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:24px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
header h1{text-align:center;font-size:1.4em;margin-bottom:4px}
header .subtitle{text-align:center;font-size:12px;opacity:.8;margin-bottom:8px}
.progress-wrap{max-width:960px;margin:0 auto;padding:0 16px}
.progress-bar{background:rgba(255,255,255,.2);border-radius:20px;height:24px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#00c853,#64dd17);border-radius:20px;transition:width .4s ease}
.progress-text{position:absolute;top:0;left:0;right:0;text-align:center;font-size:12px;line-height:24px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.stats-row{display:flex;justify-content:center;gap:24px;margin-top:8px;font-size:13px}
.stats-row span{opacity:.9}
.stats-row .ok{color:#b9f6ca}.stats-row .ng{color:#ff8a80}.stats-row .pending{color:#fff59d}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.controls button{padding:6px 16px;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s}
.controls button:hover,.controls button.active{background:rgba(255,255,255,.25);border-color:#fff}
.tester-info{background:#fff;border-radius:12px;padding:20px;margin:16px 0;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tester-info summary{cursor:pointer;font-weight:600;font-size:15px;color:#667eea}
.tester-info .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.tester-info label{font-size:13px;color:#666;display:block;margin-bottom:4px}
.tester-info input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.phase-section{margin:16px 0}
.phase-header{background:#fff;padding:14px 20px;border-radius:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .2s;user-select:none}
.phase-header:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.phase-header h2{font-size:15px;color:#333}
.phase-badge{display:flex;gap:6px;align-items:center}
.phase-badge .count{font-size:12px;padding:2px 10px;border-radius:12px;font-weight:600}
.phase-badge .ok-count{background:#e8f5e9;color:#2e7d32}
.phase-badge .ng-count{background:#ffebee;color:#c62828}
.phase-badge .arrow{font-size:12px;color:#999;transition:transform .2s}
.phase-section.open .arrow{transform:rotate(180deg)}
.phase-body{display:none;padding:8px 0}
.phase-section.open .phase-body{display:block}
.scenario-card{background:#fff;border-radius:10px;margin:8px 0;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #e0e0e0;transition:border-color .2s}
.scenario-card.ok{border-left-color:#4caf50}
.scenario-card.ng{border-left-color:#f44336}
.scenario-card .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.scenario-card .card-info{flex:1}
.scenario-card .scenario-id{font-weight:700;color:#667eea;font-size:14px;margin-right:8px}
.scenario-card .scenario-title{font-weight:600;font-size:14px}
.scenario-card .source-file{font-size:11px;color:#999;margin-top:2px;font-family:monospace}
.radio-group{display:flex;gap:4px;flex-shrink:0}
.radio-group label{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;border:1px solid #e0e0e0;transition:all .2s;user-select:none}
.radio-group input{display:none}
.radio-group .radio-ok:has(input:checked){background:#4caf50;color:#fff;border-color:#4caf50}
.radio-group .radio-ng:has(input:checked){background:#f44336;color:#fff;border-color:#f44336}
.radio-group label:hover{background:#f5f5f5}
.radio-group .radio-ok:has(input:checked):hover{background:#43a047}
.radio-group .radio-ng:has(input:checked):hover{background:#e53935}
.detail-toggle{font-size:12px;color:#667eea;cursor:pointer;margin-top:6px;display:inline-block}
.detail-toggle:hover{text-decoration:underline}
.scenario-detail{display:none;margin-top:12px;padding:12px;background:#f8f9fa;border-radius:8px;font-size:13px}
.scenario-detail.show{display:block}
.scenario-detail h4{font-size:12px;color:#666;margin:8px 0 4px;font-weight:600}
.scenario-detail h4:first-child{margin-top:0}
.scenario-detail ul{padding-left:20px;margin:0}
.scenario-detail li{margin:2px 0;color:#444}
.note-input{width:100%;margin-top:8px;padding:8px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;resize:vertical;min-height:32px;font-family:inherit}
.note-input:focus{outline:none;border-color:#667eea}
.summary-section{background:#fff;border-radius:12px;padding:20px;margin:16px 0;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.summary-section h2{font-size:16px;margin-bottom:16px;color:#333}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.summary-card{text-align:center;padding:16px;border-radius:10px}
.summary-card .num{font-size:28px;font-weight:700}
.summary-card .label{font-size:12px;margin-top:4px}
.summary-card.total{background:#f3e5f5;color:#6a1b9a}
.summary-card.s-ok{background:#e8f5e9;color:#2e7d32}
.summary-card.s-ng{background:#ffebee;color:#c62828}
.summary-card.s-pending{background:#fff8e1;color:#f57f17}
.bug-section{background:#fff;border-radius:12px;padding:20px;margin:16px 0;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.bug-section h2{font-size:16px;margin-bottom:12px;color:#333}
.bug-list{margin-bottom:16px}
.bug-item{background:#fff5f5;border:1px solid #ffcdd2;border-radius:8px;padding:12px;margin:8px 0}
.bug-item .bug-header{display:flex;justify-content:space-between;align-items:center}
.bug-item .bug-id{font-weight:700;color:#c62828}
.bug-item .bug-title{font-weight:600;margin:4px 0}
.bug-item .bug-detail{font-size:13px;color:#666;white-space:pre-wrap}
.bug-item button.del-bug{background:none;border:none;color:#999;cursor:pointer;font-size:16px}
.bug-form .row{margin:8px 0}
.bug-form label{font-size:13px;color:#666;display:block;margin-bottom:4px}
.bug-form input,.bug-form select,.bug-form textarea{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit}
.bug-form textarea{min-height:60px;resize:vertical}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:#667eea;color:#fff}.btn-primary:hover{background:#5a6fd6}
.btn-danger{background:#f44336;color:#fff}.btn-danger:hover{background:#e53935}
.btn-outline{background:transparent;border:1px solid #667eea;color:#667eea}.btn-outline:hover{background:#f0f0ff}
.export-bar{display:flex;gap:8px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.footer{text-align:center;padding:24px;color:#999;font-size:12px}
@media print{header{position:static;background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.controls,.export-bar,.bug-form,.note-input,.detail-toggle,.radio-group{display:none!important}.scenario-card{page-break-inside:avoid}.phase-body{display:block!important}.scenario-detail{display:block!important}}
@media(max-width:600px){.summary-grid{grid-template-columns:repeat(2,1fr)}.tester-info .grid{grid-template-columns:1fr}.radio-group label{padding:6px 10px}}
</style>
</head>
<body>
<header>
<h1>ProjectProfit テスト管理シート v3.0 — ソースコード検証済み</h1>
<div class="subtitle">全シナリオはソースコードの行番号レベルまで検証済み</div>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div><div class="progress-text" id="progressText">0 / 0 (0%)</div></div>
<div class="stats-row">
<span class="ok">✓ OK: <b id="statOk">0</b></span>
<span class="ng">✗ NG: <b id="statNg">0</b></span>
<span class="pending">○ 未実施: <b id="statPending">0</b></span>
</div>
<div class="controls">
<button class="active" onclick="filterScenarios('all')">すべて</button>
<button onclick="filterScenarios('pending')">未実施</button>
<button onclick="filterScenarios('ok')">OK</button>
<button onclick="filterScenarios('ng')">NG</button>
<button onclick="expandAll()">全展開</button>
<button onclick="collapseAll()">全閉じ</button>
</div>
</div>
</header>
<div class="container">
<details class="tester-info" open>
<summary>テスター情報</summary>
<div class="grid">
<div><label>テスター名</label><input id="testerName" placeholder="氏名" oninput="saveTesterInfo()"></div>
<div><label>テスト実施日</label><input id="testDate" type="date" oninput="saveTesterInfo()"></div>
<div><label>デバイス名</label><input id="deviceName" placeholder="例: iPhone 16 Pro" oninput="saveTesterInfo()"></div>
<div><label>iOSバージョン</label><input id="iosVersion" placeholder="例: iOS 18.3" oninput="saveTesterInfo()"></div>
</div>
</details>
<div id="phasesContainer"></div>
<div class="summary-section">
<h2>テスト結果サマリー</h2>
<div class="summary-grid">
<div class="summary-card total"><div class="num" id="sumTotal">0</div><div class="label">総テスト数</div></div>
<div class="summary-card s-ok"><div class="num" id="sumOk">0</div><div class="label">OK</div></div>
<div class="summary-card s-ng"><div class="num" id="sumNg">0</div><div class="label">NG</div></div>
<div class="summary-card s-pending"><div class="num" id="sumPending">0</div><div class="label">未実施</div></div>
</div>
<div style="text-align:center">
<div style="font-size:36px;font-weight:700;color:#667eea" id="sumRate">0%</div>
<div style="font-size:13px;color:#666">合格率 (OK / 実施済み)</div>
</div>
</div>
<div class="bug-section">
<h2>不具合報告</h2>
<div class="bug-list" id="bugList"></div>
<details>
<summary style="cursor:pointer;color:#667eea;font-weight:600;font-size:14px">+ 不具合を追加</summary>
<div class="bug-form" style="margin-top:12px">
<div class="row"><label>関連シナリオID</label><input id="bugScenario" placeholder="例: SE-01"></div>
<div class="row"><label>タイトル</label><input id="bugTitle" placeholder="簡潔な不具合タイトル"></div>
<div class="row"><label>重要度</label><select id="bugSeverity"><option value="致命的">致命的（クラッシュ・データ消失）</option><option value="重大">重大（機能不能・データ不正確）</option><option value="軽微" selected>軽微（表示崩れ・操作感）</option><option value="要改善">要改善（提案）</option></select></div>
<div class="row"><label>再現手順・詳細</label><textarea id="bugDetail" placeholder="1. 〜をタップ&#10;2. 〜を入力&#10;3. 〜が発生"></textarea></div>
<button class="btn btn-danger" onclick="addBug()" style="margin-top:8px">不具合を登録</button>
</div>
</details>
</div>
<div class="export-bar">
<button class="btn btn-primary" onclick="exportCSV()">CSVエクスポート</button>
<button class="btn btn-outline" onclick="exportJSON()">JSONバックアップ</button>
<button class="btn btn-outline" onclick="importJSON()">JSONインポート</button>
<button class="btn btn-outline" onclick="window.print()">印刷</button>
<button class="btn btn-danger" onclick="resetAll()">全リセット</button>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
</div>
<div class="footer">ProjectProfit テスト管理シート v3.0 — ソースコード検証済み 全25フェーズ / 137シナリオ — データはブラウザのlocalStorageに自動保存されます</div>
</div>
<script>
const SCENARIOS = [
// Phase 1 (SE): 初回起動・設定
{phase:1,phaseTitle:"Phase 1 (SE): 初回起動・設定",id:"SE-01",title:"アプリ初回起動・タブ表示確認",sourceFile:"ContentView.swift:44-78",steps:["アプリを新規インストールして起動","タブバーに5つのタブが表示されることを確認","各タブをタップして画面遷移を確認"],expected:["アプリがクラッシュせず起動する","5タブ表示: ダッシュボード(house.fill)/プロジェクト(folder.fill)/取引履歴(list.bullet.rectangle)/レポート(chart.bar.doc.horizontal.fill)/設定(gearshape.fill)","各タブで対応画面が表示される"]},
{phase:1,phaseTitle:"Phase 1 (SE): 初回起動・設定",id:"SE-02",title:"データ統計セクション表示",sourceFile:"SettingsView.swift:91-125",steps:["「設定」タブをタップ","「データ統計」セクションを確認"],expected:["3列のカードが表示される（プロジェクト数/取引数/定期取引数）","初回は全て0表示","データ追加後に数値が更新される"]},
{phase:1,phaseTitle:"Phase 1 (SE): 初回起動・設定",id:"SE-03",title:"会計年度の開始月変更（インラインPicker）",sourceFile:"SettingsView.swift:129-175",steps:["「設定」タブ→「会計年度」セクションを確認","開始月Pickerをタップして展開","開始月を「4月」に変更","ダッシュボードで年度表示を確認"],expected:["インラインPickerで1月〜12月が選択可能（別画面遷移不要）","選択後に即座に反映される","ダッシュボードの年度表示が4月始まりに変更"]},
{phase:1,phaseTitle:"Phase 1 (SE): 初回起動・設定",id:"SE-04",title:"法定保存期間の情報表示",sourceFile:"SettingsView.swift:179-216",steps:["「設定」→「法定保存期間」セクションを確認","各カードの保存期間を確認"],expected:["帳簿: 7年の保存期間カード表示","書類: 7年","領収書: 7年","その他書類: 5年"]},
{phase:1,phaseTitle:"Phase 1 (SE): 初回起動・設定",id:"SE-05",title:"カテゴリ管理シート表示",sourceFile:"SettingsView.swift:239-248",steps:["「設定」→「管理」セクション→「カテゴリ管理」をタップ"],expected:["カテゴリ管理シートが表示される","経費カテゴリ11件: ホスティング/ツール/広告/請負業者/通信費/消耗品/交通費/食費・飲食/接待・会議費/保険料/その他経費","収入カテゴリ3件: 売上/サービス収入/その他収入"]},
{phase:1,phaseTitle:"Phase 1 (SE): 初回起動・設定",id:"SE-06",title:"アプリ情報の表示",sourceFile:"SettingsView.swift:358-382",steps:["「設定」→最下部の「アプリ情報」セクションを確認"],expected:["アプリバージョン番号が表示される","アプリの説明テキストが表示される"]},
{phase:1,phaseTitle:"Phase 1 (SE): 初回起動・設定",id:"SE-07",title:"DataStoreエラーアラート表示",sourceFile:"ContentView.swift:81-88",steps:["DataStoreでエラーが発生する操作を実行（またはエラーをシミュレーション）"],expected:["エラーアラートが表示される","エラーの説明文(errorDescription)が表示される","OKボタンでアラートを閉じられる"]},
// Phase 2 (PJ): プロジェクト管理
{phase:2,phaseTitle:"Phase 2 (PJ): プロジェクト管理",id:"PJ-01",title:"空状態表示",sourceFile:"ProjectsView.swift:183-219",steps:["「プロジェクト」タブをタップ","プロジェクトが0件の状態で画面を確認"],expected:["folder.badge.plusアイコンが中央に表示","「プロジェクトがありません」テキスト表示","「プロジェクトを追加」ボタン表示"]},
{phase:2,phaseTitle:"Phase 2 (PJ): プロジェクト管理",id:"PJ-02",title:"新規作成（名前必須バリデーション）",sourceFile:"ProjectFormView.swift",steps:["「プロジェクト」→「+」ボタンをタップ","名前を空のまま「保存」ボタンを確認","名前に「テストプロジェクト」を入力","「保存」をタップ"],expected:["新規作成フォームが表示される","名前が空の場合「保存」ボタンが無効（グレーアウト）","名前入力後「保存」が有効になる","保存成功し一覧に表示される"]},
{phase:2,phaseTitle:"Phase 2 (PJ): プロジェクト管理",id:"PJ-03",title:"フィルタータブ（all/active/completed/paused/archived）",sourceFile:"ProjectsView.swift:94-168",steps:["プロジェクトを各ステータスで作成","フィルタータブ「すべて」「進行中」「完了」「保留」「アーカイブ」を順にタップ"],expected:["「すべて」: 全プロジェクト表示","「進行中」: activeのみ表示","「完了」: completedのみ表示","「保留」: pausedのみ表示","「アーカイブ」: archivedのみ表示"]},

{phase:2,phaseTitle:"Phase 2 (PJ): プロジェクト管理",id:"PJ-07",title:"詳細画面表示",sourceFile:"ProjectDetailView.swift",steps:["プロジェクト一覧からプロジェクトをタップ"],expected:["プロジェクト名（title2, bold）表示","ステータスバッジ（色付き）表示","開始日/完了日/終了予定日表示","利益カード（大）と収入/支出カード（小×2）表示","最近の取引一覧"]},

{phase:2,phaseTitle:"Phase 2 (PJ): プロジェクト管理",id:"PJ-10",title:"プロジェクト編集",sourceFile:"ProjectFormView.swift",steps:["プロジェクト詳細→鉛筆アイコン(pencil.circle.fill)をタップ","説明文を変更→「保存」"],expected:["編集フォームに既存データがプリフィル","変更が保存される","詳細画面に反映"]},
{phase:2,phaseTitle:"Phase 2 (PJ): プロジェクト管理",id:"PJ-11",title:"ダッシュボードからのプロジェクト追加",sourceFile:"DashboardView.swift:295-301",steps:["「ダッシュボード」タブをタップ","プロジェクト追加ボタンをタップ"],expected:["プロジェクト追加フォームが表示される","保存後ダッシュボードに反映"]},

const STORAGE_KEY = 'pp-test-sheet-v3';
let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : {results:{},notes:{},tester:{},bugs:[]};
  } catch(e) { return {results:{},notes:{},tester:{},bugs:[]}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateStats();
}

function saveTesterInfo() {
  state.tester = {
    name: document.getElementById('testerName').value,
    date: document.getElementById('testDate').value,
    device: document.getElementById('deviceName').value,
    ios: document.getElementById('iosVersion').value
  };
  saveState();
}

function setResult(id, result) {
  state.results[id] = result;
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    card.classList.remove('ok','ng');
    if (result) card.classList.add(result);
  }
  saveState();
}

function setNote(id, note) {
  state.notes[id] = note;
  saveState();
}

function updateStats() {
  let ok=0, ng=0;
  SCENARIOS.forEach(s => {
    const r = state.results[s.id];
    if (r === 'ok') ok++;
    else if (r === 'ng') ng++;
  });
  const total = SCENARIOS.length;
  const pending = total - ok - ng;
  const done = ok + ng;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const rate = done > 0 ? Math.round((ok / done) * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} (${pct}%)`;
  document.getElementById('statOk').textContent = ok;
  document.getElementById('statNg').textContent = ng;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('sumTotal').textContent = total;
  document.getElementById('sumOk').textContent = ok;
  document.getElementById('sumNg').textContent = ng;
  document.getElementById('sumPending').textContent = pending;
  document.getElementById('sumRate').textContent = rate + '%';

  const phases = [...new Set(SCENARIOS.map(s => s.phase))];
  phases.forEach(p => {
    const pScenarios = SCENARIOS.filter(s => s.phase === p);
    let pOk=0, pNg=0;
    pScenarios.forEach(s => {
      const r = state.results[s.id];
      if (r === 'ok') pOk++;
      else if (r === 'ng') pNg++;
    });
    const okEl = document.getElementById(`phase-ok-${p}`);
    const ngEl = document.getElementById(`phase-ng-${p}`);
    if (okEl) okEl.textContent = `✓${pOk}`;
    if (ngEl) ngEl.textContent = `✗${pNg}`;
    if (ngEl) ngEl.style.display = pNg > 0 ? 'inline' : 'none';
  });
}

function filterScenarios(filter) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.scenario-card').forEach(card => {
    const id = card.dataset.id;
    const r = state.results[id] || 'pending';
    card.style.display = (filter === 'all' || r === filter) ? '' : 'none';
  });
}

function expandAll() {
  document.querySelectorAll('.phase-section').forEach(s => s.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.phase-section').forEach(s => s.classList.remove('open'));
}

function togglePhase(el) {
  el.closest('.phase-section').classList.toggle('open');
}

function toggleDetail(el) {
  const detail = el.nextElementSibling;
  detail.classList.toggle('show');
  el.textContent = detail.classList.contains('show') ? '▲ 詳細を閉じる' : '▼ 詳細を表示';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPhases() {
  const container = document.getElementById('phasesContainer');
  const phases = [...new Set(SCENARIOS.map(s => s.phase))];
  let html = '';

  phases.forEach(p => {
    const pScenarios = SCENARIOS.filter(s => s.phase === p);
    const title = pScenarios[0].phaseTitle;
    html += `<div class="phase-section">
      <div class="phase-header" onclick="togglePhase(this)">
        <h2>${escHtml(title)} (${pScenarios.length}件)</h2>
        <div class="phase-badge">
          <span class="count ok-count" id="phase-ok-${p}">✓0</span>
          <span class="count ng-count" id="phase-ng-${p}" style="display:none">✗0</span>
          <span class="arrow">▼</span>
        </div>
      </div>
      <div class="phase-body">`;

    pScenarios.forEach(s => {
      const r = state.results[s.id] || '';
      const note = state.notes[s.id] || '';
      const srcDisplay = s.sourceFile ? `<div class="source-file">📄 ${escHtml(s.sourceFile)}</div>` : '';
      html += `<div class="scenario-card ${r}" data-id="${s.id}">
        <div class="card-top">
          <div class="card-info">
            <span class="scenario-id">${escHtml(s.id)}</span>
            <span class="scenario-title">${escHtml(s.title)}</span>
            ${srcDisplay}
          </div>
          <div class="radio-group">
            <label class="radio-ok"><input type="radio" name="r-${s.id}" value="ok" ${r==='ok'?'checked':''} onchange="setResult('${s.id}','ok')">OK</label>
            <label class="radio-ng"><input type="radio" name="r-${s.id}" value="ng" ${r==='ng'?'checked':''} onchange="setResult('${s.id}','ng')">NG</label>
          </div>
        </div>
        <span class="detail-toggle" onclick="toggleDetail(this)">▼ 詳細を表示</span>
        <div class="scenario-detail">
          <h4>手順</h4><ul>${s.steps.map(st=>`<li>${escHtml(st)}</li>`).join('')}</ul>
          <h4>期待結果</h4><ul>${s.expected.map(e=>`<li>✅ ${escHtml(e)}</li>`).join('')}</ul>
        </div>
        <input class="note-input" placeholder="備考・不具合メモ" value="${escHtml(note)}" oninput="setNote('${s.id}',this.value)">
      </div>`;
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

function addBug() {
  const scenario = document.getElementById('bugScenario').value;
  const title = document.getElementById('bugTitle').value;
  const severity = document.getElementById('bugSeverity').value;
  const detail = document.getElementById('bugDetail').value;
  if (!title) { alert('タイトルを入力してください'); return; }
  state.bugs.push({id: Date.now(), scenario, title, severity, detail, date: new Date().toLocaleDateString('ja-JP')});
  saveState();
  renderBugs();
  document.getElementById('bugScenario').value = '';
  document.getElementById('bugTitle').value = '';
  document.getElementById('bugDetail').value = '';
}

function deleteBug(id) {
  state.bugs = state.bugs.filter(b => b.id !== id);
  saveState();
  renderBugs();
}

function renderBugs() {
  const list = document.getElementById('bugList');
  if (state.bugs.length === 0) { list.innerHTML = '<p style="color:#999;font-size:13px">不具合報告はまだありません</p>'; return; }
  list.innerHTML = state.bugs.map(b => `
    <div class="bug-item">
      <div class="bug-header">
        <span class="bug-id">#${escHtml(b.scenario || '---')} [${escHtml(b.severity)}]</span>
        <button class="del-bug" onclick="deleteBug(${b.id})">✕</button>
      </div>
      <div class="bug-title">${escHtml(b.title)}</div>
      <div class="bug-detail">${escHtml(b.detail)}</div>
      <div style="font-size:11px;color:#999;margin-top:4px">${escHtml(b.date)}</div>
    </div>`).join('');
}

function exportCSV() {
  let csv = '\uFEFF"#","Phase","シナリオID","テスト内容","検証ファイル","結果","備考"\n';
  SCENARIOS.forEach((s,i) => {
    const r = state.results[s.id] || '未実施';
    const n = (state.notes[s.id] || '').replace(/"/g,'""');
    const sf = (s.sourceFile || '').replace(/"/g,'""');
    csv += `"${i+1}","${s.phaseTitle}","${s.id}","${s.title}","${sf}","${r}","${n}"\n`;
  });
  if (state.bugs.length > 0) {
    csv += '\n"不具合報告"\n"シナリオ","タイトル","重要度","詳細","日付"\n';
    state.bugs.forEach(b => {
      csv += `"${b.scenario}","${b.title}","${b.severity}","${b.detail.replace(/"/g,'""')}","${b.date}"\n`;
    });
  }
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `テスト結果_v3_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `テスト管理バックアップ_v3_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON() {
  document.getElementById('importFile').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported.results) {
        state = imported;
        saveState();
        init();
        alert('インポート完了');
      }
    } catch(err) { alert('無効なJSONファイルです'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetAll() {
  if (!confirm('すべてのテスト結果をリセットしますか？この操作は取り消せません。')) return;
  state = {results:{},notes:{},tester:{},bugs:[]};
  saveState();
  init();
}

function init() {
  renderPhases();
  renderBugs();
  if (state.tester) {
    document.getElementById('testerName').value = state.tester.name || '';
    document.getElementById('testDate').value = state.tester.date || '';
    document.getElementById('deviceName').value = state.tester.device || '';
    document.getElementById('iosVersion').value = state.tester.ios || '';
  }
  updateStats();
}

init();
</script>
