name: ProjectProfit
options:
  bundleIdPrefix: com.projectprofit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: ja

packages:
  libxlsxwriter:
    url: https://github.com/jmcnamara/libxlsxwriter
    from: "1.1.5"

targets:
  ProjectProfit:
    type: application
    platform: iOS
    dependencies:
      - package: libxlsxwriter
      - target: ProjectProfitShareExtension
        embed: true
    sources:
      - path: ProjectProfit
        excludes:
          - "Ledger/Bridge/xlsxwriter"
          - "Resources/TaxYearPacks"
          - "Application/UseCases/Legacy/LegacyTransactionCompatibilityUseCase.swift"
    resources:
      - path: ProjectProfit/Ledger/Resources
        buildPhase: resources
      - path: ProjectProfit/Resources/TaxYearPacks
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: "Project Profit"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 52PPJXD67Z
        PRODUCT_BUNDLE_IDENTIFIER: com.projectprofit.ProjectProfit
        CODE_SIGN_ENTITLEMENTS: ProjectProfit/ProjectProfit.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "レシート・請求書・領収書を撮影して取引を自動入力するためにカメラを使用します"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "レシート・請求書・領収書の画像を選択するためにフォトライブラリを使用します"
        DEVELOPMENT_ASSET_PATHS: "\"ProjectProfit/Preview Content\""
        ENABLE_PREVIEWS: YES
        OTHER_SWIFT_FLAGS: "-Xfrontend -solver-expression-time-threshold=60"
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/ProjectProfit/Ledger/Bridge/xlsxwriter"
        HEADER_SEARCH_PATHS: "$(BUILD_DIR)/../../SourcePackages/checkouts/libxlsxwriter/include"

  ProjectProfitShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ProjectProfitShareExtension
    settings:
      base:
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 52PPJXD67Z
        PRODUCT_BUNDLE_IDENTIFIER: com.projectprofit.ProjectProfit.ShareExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ProjectProfitShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ProjectProfitShareExtension/ProjectProfitShareExtension.entitlements
        TARGETED_DEVICE_FAMILY: 1
        APPLICATION_EXTENSION_API_ONLY: YES

  ProjectProfitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ProjectProfitTests
      - path: ProjectProfit/Application/UseCases/Legacy/LegacyTransactionCompatibilityUseCase.swift
    dependencies:
      - target: ProjectProfit
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 52PPJXD67Z
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ProjectProfit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ProjectProfit"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/ProjectProfit/Ledger/Bridge/xlsxwriter"
        HEADER_SEARCH_PATHS: "$(BUILD_DIR)/../../SourcePackages/checkouts/libxlsxwriter/include"
