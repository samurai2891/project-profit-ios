name: ProjectProfit
options:
  bundleIdPrefix: com.projectprofit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: ja

targets:
  ProjectProfit:
    type: application
    platform: iOS
    sources:
      - ProjectProfit
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: "Project Profit"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 52PPJXD67Z
        PRODUCT_BUNDLE_IDENTIFIER: com.projectprofit.ProjectProfit
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "レシートを撮影して経費を自動登録するためにカメラを使用します"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "レシート画像を選択するためにフォトライブラリを使用します"
        DEVELOPMENT_ASSET_PATHS: "\"ProjectProfit/Preview Content\""
        ENABLE_PREVIEWS: YES

  ProjectProfitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ProjectProfitTests
    dependencies:
      - target: ProjectProfit
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 52PPJXD67Z
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ProjectProfit.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ProjectProfit"
        BUNDLE_LOADER: "$(TEST_HOST)"
